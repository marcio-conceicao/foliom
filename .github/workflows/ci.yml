name: CI

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Round-trip gate (ACPT-01) compares raw bytes. .gitattributes at
          # the repo root forces LF for `.md` files and `-text` for the
          # entire `data-folder-sample/**` tree, so Windows autocrlf cannot
          # mangle the corpus.
          fetch-depth: 1

      # ─── Node.js BEFORE Rust ────────────────────────────────────────
      # Plan 02-07 embeds `frontend/dist/` into the release binary via
      # rust-embed; the dist must exist before `cargo build --release`
      # so the embed macro picks up real assets (an empty dist would
      # ship a 404-only shell).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend (produces frontend/dist/)
        working-directory: frontend
        run: npm run build

      - name: Frontend unit tests (vitest)
        working-directory: frontend
        run: npm run test

      # Plan 02-08 bundle-size gate. Updated in plan 03-04 to 900 KB:
      # CM6 core packages (@codemirror/state+view+commands+language+lang-markdown+autocomplete)
      # add ~540 KB minified (actual, vs the ~180 KB estimate in the plan). The gzip budget
      # (~275 KB gzip actual vs old ~300 KB gzip target) is still within a reasonable envelope
      # for a localhost dev tool. The ceiling will be tightened in Phase 5 with tree-shaking.
      - name: Frontend bundle size gate (900 KB ceiling)
        working-directory: frontend
        shell: bash
        run: |
          SIZE=$(du -sk dist | cut -f1)
          echo "frontend dist size: ${SIZE} KB (ceiling: 900 KB)"
          if [ "$SIZE" -gt 900 ]; then
            echo "::error::Bundle size ${SIZE} KB exceeds 900 KB budget"
            exit 1
          fi

      # ─── Rust ───────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@v2
        with:
          # Bumped from `phase1-…` to `phase2-…` because the Cargo.lock
          # changed materially (axum, sysinfo, rand, criterion landed).
          shared-key: phase2-${{ matrix.os }}

      # Tauri 2 (foliom-tauri workspace member) needs webkit2gtk + GTK on Linux.
      # Without these packages `cargo build --workspace` fails with
      # "Package glib-2.0 was not found in the pkg-config search path."
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: cargo build
        run: cargo build --workspace --locked

      - name: cargo nextest run (parser + scanner + roundtrip + storage + cli + serve)
        run: cargo nextest run --workspace --no-fail-fast

      - name: Build release foliom binary
        run: cargo build --release --bin foliom --locked

      # ─── Phase 1 inventory smoke (unchanged) ────────────────────────
      - name: Inventory smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./target/release/foliom inventory crates/core/tests/fixtures/logseq-synthetic --json > /tmp/inv.json
          # Assert scannedFiles > 0 without requiring jq on the matrix.
          python3 -c "import json,sys; d=json.load(open('/tmp/inv.json')); sys.exit(0 if d['scannedFiles'] > 0 else 1)"

      - name: Inventory smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./target/release/foliom.exe inventory crates/core/tests/fixtures/logseq-synthetic --json > $env:TEMP\inv.json
          $report = Get-Content $env:TEMP\inv.json | ConvertFrom-Json
          if ($report.scannedFiles -le 0) {
            Write-Error "inventory smoke: scannedFiles is 0"
            exit 1
          }

      # ─── Phase 2 end-to-end smoke (plan 02-08) ──────────────────────
      # Boots `foliom serve` in the background, hits /api/health and
      # /api/pages, asserts both shapes, kills the child.
      - name: E2E smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./target/release/foliom serve crates/core/tests/fixtures/logseq-synthetic --port 7346 &
          SERVE_PID=$!
          # Give serve a moment to bind + run the initial reindex on the
          # 12-file synthetic fixture (fast — <2 s).
          sleep 3
          curl -fsS http://127.0.0.1:7346/api/health | grep -q '"ok":true'
          curl -fsS http://127.0.0.1:7346/api/pages | python3 -c "import sys,json; d=json.load(sys.stdin); assert isinstance(d,list) and len(d)>0, 'pages must be non-empty list'"
          kill $SERVE_PID
          wait $SERVE_PID 2>/dev/null || true

      - name: E2E smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Pitfall 5 (02-RESEARCH): Invoke-RestMethod (not curl) on
          # Windows runners. curl.exe is present but its TLS stack and
          # argument parsing differ from the Unix build.
          $proc = Start-Process -FilePath "./target/release/foliom.exe" `
                                -ArgumentList "serve","crates/core/tests/fixtures/logseq-synthetic","--port","7346" `
                                -PassThru
          Start-Sleep -Seconds 3
          try {
            $health = Invoke-RestMethod -Uri "http://127.0.0.1:7346/api/health"
            if (-not $health.ok) { Write-Error "health failed"; exit 1 }
            $pages = Invoke-RestMethod -Uri "http://127.0.0.1:7346/api/pages"
            if ($pages.Count -le 0) { Write-Error "pages empty"; exit 1 }
          } finally {
            Stop-Process -Id $proc.Id -Force
          }

  # ─── Phase 2 perf gates (plan 02-08, Linux-only) ──────────────────
  # Runs only after the cross-platform test matrix is green so we don't
  # burn bench minutes on PRs that already broke unit tests. ACPT-02
  # ceiling = 3 s; ACPT-03 ceiling = 450 MB (target × 1.5 per D-35).
  bench:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (required by rust-embed at compile time)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: phase2-bench

      - name: Build release artifacts (foliom + bench tools)
        run: cargo build --release --bin foliom --bin foliom-bench-gen --bin foliom-bench-rss --locked

      - name: Generate synthetic 5k corpus (deterministic, seed=42)
        run: ./target/release/foliom-bench-gen --out /tmp/synth-5k --count 5000 --seed 42

      - name: Cold-start benchmark (ACPT-02)
        run: cargo bench --bench cold_start -- --save-baseline phase2

      - name: ACPT-02 gate (cold start < 3 s)
        run: |
          python3 scripts/bench_assert.py \
            "target/criterion/cold_start_5k/db_open_reindex_full/new/estimates.json" \
            3000000000

      - name: ACPT-03 gate (idle RSS < 450 MB)
        run: ./target/release/foliom-bench-rss /tmp/synth-5k

      - name: Upload Criterion report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-report
          path: target/criterion/cold_start_5k/
          retention-days: 14

  # ─── Phase 3 ACPT-05 portability gate (plan 03-07, Linux-only) ────────
  # Runs only after the cross-platform test matrix is green.
  # Drives a scripted edit sequence through the full mutation API, then
  # asserts byte invariants (no CRLF, no BOM, valid UTF-8), Foliom-metadata
  # grep (zero id:: / (( / <!-- foliom injections), and ACPT-01 corpus
  # replay (segment→slice-concat→byte-equal).
  #
  # The Obsidian / VS Code manual verification is NOT part of this job; see
  # .planning/phases/03-outliner-editor/ACPT-05-PORTABILITY.md.
  phase-3-acpt-05:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (required by rust-embed at compile time)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: phase3-acpt05

      - name: ACPT-05 automated portability test
        run: cargo test -p foliom-cli --test portability_acpt_05 -- --nocapture

  # ─── Phase 4 watcher smoke (plan 04-03, Linux-only) ─────────────────
  # Runs after the cross-platform test suite is green.
  # Boots `foliom serve` as a real subprocess, subscribes to the SSE
  # endpoint, writes an external .md file, and asserts `pages_updated`
  # arrives within 1.5s (debounce 300ms + coalescing 300ms + margin).
  #
  # Linux only: Windows watcher behavior is covered by the manual
  # acceptance checklist in .planning/phases/04-disk-sync/ACPT-04-WATCHER.md.
  # CI runner is ubuntu-latest (real Linux kernel inotify), not WSL2, so
  # inotify limitations for /mnt/c paths do not apply here.
  #
  # The watcher_integration unit tests (SNC-03 + SNC-04) are already
  # covered by the cross-platform test job above via
  # `cargo nextest run --workspace`. This job adds the end-to-end process
  # boundary smoke on top.
  phase-4-watcher-smoke:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (required by rust-embed at compile time)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: phase4-watcher-smoke

      - name: Build release foliom binary
        run: cargo build --release --bin foliom --locked

      - name: Create minimal watcher smoke corpus
        run: |
          mkdir -p /tmp/watcher-smoke/pages /tmp/watcher-smoke/journals
          echo "- Hello smoke" > /tmp/watcher-smoke/pages/Smoke.md

      - name: Start foliom serve in background
        run: |
          ./target/release/foliom serve /tmp/watcher-smoke --port 7345 &
          echo $! > /tmp/foliom-smoke.pid
          echo "foliom PID: $(cat /tmp/foliom-smoke.pid)"

      - name: Subscribe to SSE endpoint
        run: |
          curl --silent --no-buffer -N http://127.0.0.1:7345/api/watch/events \
            > /tmp/sse_output.txt 2>&1 &
          echo $! > /tmp/sse-curl.pid
          echo "SSE curl PID: $(cat /tmp/sse-curl.pid)"

      - name: Wait for server warmup
        run: sleep 1

      - name: Write external .md file (simulates VS Code / Syncthing external edit)
        run: |
          echo "- ExternalEdit $(date)" > /tmp/watcher-smoke/pages/ExternalEdit.md
          echo "Wrote ExternalEdit.md at $(date)"

      - name: Wait for debounce + coalesce + margin (1.5s)
        run: sleep 1.5

      - name: Assert pages_updated SSE event received
        run: |
          echo "--- SSE output so far ---"
          cat /tmp/sse_output.txt || true
          echo "--- end SSE output ---"
          grep -q "pages_updated" /tmp/sse_output.txt || {
            echo "FAIL: no pages_updated event found in SSE output"
            echo "Foliom server log (last 20 lines):"
            kill "$(cat /tmp/foliom-smoke.pid)" 2>/dev/null || true
            kill "$(cat /tmp/sse-curl.pid)" 2>/dev/null || true
            exit 1
          }
          echo "OK: pages_updated event received within 1.5s"

      - name: Cleanup smoke processes
        if: always()
        run: |
          kill "$(cat /tmp/foliom-smoke.pid)" 2>/dev/null || true
          kill "$(cat /tmp/sse-curl.pid)" 2>/dev/null || true
          true
