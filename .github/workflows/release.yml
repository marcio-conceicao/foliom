name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 (macOS leg disabled — Windows-only releases for now)
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust_targets: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}

    # Lift secret to job-level env so step `if:` can gate on it.
    # `secrets.*` is not allowed in step-level `if:` expressions.
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: phase5-${{ matrix.platform }}

      # Windows: import signing certificate from base64-encoded PFX.
      # Skipped when WINDOWS_CERTIFICATE secret is absent (forks, unsigned CI runs).
      - name: Import Windows certificate
        if: env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          New-Item -ItemType directory -Path certificate
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item -path certificate/tempCert.txt
          Import-PfxCertificate -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD `
              -Force -AsPlainText)

      # Build and upload to GitHub Release (draft).
      # Signing env vars are passed unconditionally; tauri-action treats
      # absent (empty string) secrets as "no signing" and produces unsigned artifacts.
      - name: Build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          # Use the actual git tag that triggered the workflow, not the
          # app version from tauri.conf.json. Avoids drift between trigger
          # tag and release tag.
          tagName: ${{ github.ref_name }}
          releaseName: "Foliom ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Footprint gate: installer size must be < 30 MB (DSK-03)
      - name: Footprint gate — Installer size < 30 MB (Windows)
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "target\x86_64-pc-windows-msvc\release\bundle" `
            -Recurse -Include "*.msi","*.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Error "No installer found — tauri-action may have failed"
            exit 1
          }
          $sizeMb = [math]::Ceiling($installer.Length / 1MB)
          Write-Host "Installer: $($installer.FullName)"
          Write-Host "Size: $sizeMb MB  (ceiling: 30 MB)  [DSK-03]"
          if ($sizeMb -gt 30) {
            Write-Error "Installer $sizeMb MB exceeds 30 MB budget (DSK-03)"
            exit 1
          }
          Write-Host "OK: installer size within budget"
